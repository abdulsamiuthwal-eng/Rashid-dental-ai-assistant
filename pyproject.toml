# =============================================================================
# Rashid Dental AI Assistant — Pytest Configuration
# =============================================================================
# [pytest]
# This file configures pytest for the project.
# Run tests: pytest
# Run with coverage: pytest --cov=backend --cov-report=html
# =============================================================================

[tool.pytest.ini_options]
# Test discovery
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

# Async test support
asyncio_mode = "auto"

# Output configuration
addopts = [
    "--strict-markers",        # Fail on unregistered markers
    "--strict-config",         # Fail on config warnings
    "-v",                      # Verbose output
    "--tb=short",              # Shorter tracebacks
    "--no-header",             # Cleaner output
]

# Custom markers
markers = [
    "unit: Unit tests (no external dependencies)",
    "integration: Integration tests (requires database)",
    "e2e: End-to-end tests (requires full stack)",
    "slow: Tests that take more than 1 second",
    "rag: Tests related to the RAG pipeline",
    "ai: Tests that call external AI APIs",
]

# Coverage configuration (pytest-cov)
[tool.coverage.run]
source = ["backend"]
omit = [
    "*/tests/*",
    "*/migrations/*",
    "*/__pycache__/*",
    "*/venv/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
]
fail_under = 80
show_missing = true

# =============================================================================
# Ruff — Linter and Formatter Configuration
# =============================================================================

[tool.ruff]
target-version = "py311"
line-length = 100
indent-width = 4

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "N",    # pep8-naming
    "S",    # bandit (security)
    "T20",  # flake8-print (disallows print statements)
    "ANN",  # flake8-annotations
    "D",    # pydocstyle
]
ignore = [
    "D100",  # Missing docstring in public module
    "D104",  # Missing docstring in public package
    "D107",  # Missing docstring in __init__
    "ANN101",# Missing type annotation for self
    "ANN102",# Missing type annotation for cls
    "S101",  # Use of assert detected (allowed in tests)
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["ANN", "S", "D"]  # Relax rules for test files
"scripts/**/*.py" = ["T201", "ANN", "D", "S", "E402"]  # CLI scripts: allow print, path hacks

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

# =============================================================================
# MyPy — Static Type Checking
# =============================================================================

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
disallow_untyped_defs = true
disallow_any_generics = true
check_untyped_defs = true
disallow_incomplete_defs = true
warn_redundant_casts = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false
strict = false

[[tool.mypy.overrides]]
module = "loguru.*"
ignore_errors = true
